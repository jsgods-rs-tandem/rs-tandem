name: CI
on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Setup NPM
        run: npm install -g npm@11.10.1

      - name: Verify lockfile is up to date
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Setup NPM
        run: npm install -g npm@11.10.1

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Setup NPM
        run: npm install -g npm@11.10.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        ports: ['5432:5432']
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: qwe123
          POSTGRES_DB: rs_tandem
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:4200
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: qwe123
      DB_NAME: rs_tandem
      DATABASE_URL: postgresql://postgres:qwe123@localhost:5432/rs_tandem
      JWT_SECRET: ci-e2e-test-secret-key-not-for-production
      JWT_EXPIRES_IN: 8h
      IS_CI: true
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Setup NPM
        run: npm install -g npm@11.10.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: packages/frontend

      - name: Run migrations
        run: npm run migrate:up -w @rs-tandem/backend

      - name: Start services
        run: npm start &

      - name: Wait for services
        run: |
          echo "Waiting for frontend and backend..."
          timeout 60 bash -c 'until curl -s http://localhost:4200 > /dev/null 2>&1; do sleep 2; done' || (echo "Frontend did not start" && exit 1)
          timeout 60 bash -c 'until curl -s http://localhost:3000/api > /dev/null 2>&1; do sleep 2; done' || (echo "Backend did not start" && exit 1)
          echo "Services are ready"

      - name: Run E2E tests
        run: npx playwright test
        working-directory: packages/frontend

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/playwright/report/
          retention-days: 2
