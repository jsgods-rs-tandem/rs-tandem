@let results = quizService.results();
@let links = results?.links;

<app-layout [loading]="quizService.loading().results">
  @if (results) {
    <header>
      <h1 class="h2">Results</h1>
    </header>

    <div class="results-page__body">
      <h2 class="h3 results-page__heading">{{ heading() }}</h2>

      <p class="h3 results-page__subheading">
        Your progress is
        <strong class="results-page__progress">{{ results.score | number: '2.0-0' }}%</strong>
      </p>

      <div class="results-page__recommendations">
        <h3 class="h4">Further reading:</h3>

        <ul class="results-page__reading-list">
          @for (link of links; track $index) {
            <li>
              <app-button
                class="results-page__reading-link"
                version="ghost"
                [href]="link"
                [text]="link"
                [external]="true"
              />
            </li>
          }
        </ul>
      </div>

      <div class="results-page__buttons">
        <app-button [link]="`${ROUTE_PATHS.quiz}/${categoryId()}`">See other topics</app-button>

        <app-button link="..">Re-explore topic</app-button>
      </div>
    </div>
  }
</app-layout>
