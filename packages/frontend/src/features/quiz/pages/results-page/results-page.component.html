@let linksValue = links;

<app-layout>
  <header>
    <h2 class="h2">Results</h2>
  </header>

  <div class="results-page__body">
    <h3 class="h3 results-page__heading">{{ heading() }}</h3>

    <p class="h3 results-page__subheading">
      Your progress is
      <strong class="results-page__progress"
        >{{ progressInPercentage() | number: '2.0-0' }}%</strong
      >
    </p>

    <div class="results-page__recommendations">
      <h4 class="h4">Further reading:</h4>

      <ul class="results-page__reading-list">
        @for (link of linksValue; track $index) {
          <li>
            <app-button
              class="results-page__reading-link"
              version="ghost"
              [href]="link"
              [text]="link"
              [external]="true"
            />
          </li>
        }
      </ul>
    </div>

    <app-button class="results-page__retry-button" link="..">Re-explore topic</app-button>
  </div>
</app-layout>
