@let loading = quizService.loading();
@let categoriesValue = quizService.categories();

<!-- TODO: think on making template reusable as in Atomic Design level -->
<app-layout [loading]="loading.categories || loading.category">
  @if (categoriesValue.length > 0) {
    <header class="categories-page__header">
      <h1 class="h2">{{ 'quiz.categories.heading' | transloco }}</h1>
    </header>

    <app-category-card-list
      class="categories-page__category-card-list"
      [categories]="quizService.categories()"
    />
  } @else {
    <app-empty
      class="categories-page__empty"
      [heading]="'quiz.categories.empty.heading' | transloco"
      [headingLevel]="1"
      [description]="'quiz.categories.empty.description' | transloco"
      ><app-button
        class="categories-page__refresh-button"
        [isSmallButton]="true"
        (click)="quizService.reloadPage()"
        >{{ 'quiz.categories.empty.refreshButton' | transloco }}</app-button
      ></app-empty
    >
  }
</app-layout>
