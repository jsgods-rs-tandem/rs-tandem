@let questionValue = question()!;

<app-layout>
  <header>
    <h2 class="h2">{{ name }}</h2>
  </header>

  <div class="quiz-page__body">
    <form class="quiz-page__form" [formGroup]="quizForm" novalidate (ngSubmit)="onSubmit()">
      <app-countdown-timer
        class="quiz-page__timer"
        [resetKey]="questionValue.id"
        [isRunning]="!isAnswerSubmitted()"
        (expired)="onTimeExpired()"
      />

      <h3 class="h3 quiz-page__question">
        Question {{ questionValue.step | number: '2.0-0' }} of&nbsp;{{
          questionsCount | number: '2.0-0'
        }}
      </h3>

      <app-answer-tile-group
        class="quiz-page__answer-tile-group"
        formControlName="answer"
        [id]="questionValue.id"
        [question]="questionValue.question"
        [codeSnippet]="questionValue.codeSnippet"
        [answers]="questionValue.answers | shuffle"
        [answerResult]="answerResult()"
        [answerComment]="comment()"
      />

      @if (error) {
        <span class="quiz-page__error">{{ error }}</span>
      }

      <app-button
        class="quiz-page__submit-button"
        type="submit"
        [link]="resultsLink()"
        [disabled]="quizForm.touched && quizForm.invalid"
        >{{ submitButtonText() }}</app-button
      >
    </form>
  </div>
</app-layout>
