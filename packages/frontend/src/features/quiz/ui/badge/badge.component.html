@let l = level();
@let status = progressStatus();

<div class="badge">
  @if (status) {
    <span class="text badge__button badge__button_in-progress">{{ status }}</span>
  } @else {
    <button
      [id]="id"
      class="text badge badge__button badge__button_{{ l }}"
      type="button"
      [attr.popovertarget]="anchorId"
    >
      {{ l | titlecase }}
    </button>

    <app-popover [id]="anchorId" [anchorId]="id">
      <ul>
        <li>90%+ Senior</li>
        <li>70%+ Middle</li>
        <li>50%+ Junior</li>
      </ul>
    </app-popover>
  }
</div>
