@let now = valueNow();
@let max = valueMax();
@let progress = valueProgress();

<div class="progress">
  <button [id]="id" class="progress__button" type="button" [attr.popovertarget]="anchorId">
    <span
      class="progress__bar"
      role="progressbar"
      aria-valuemin="0"
      [aria-valuenow]="now"
      [aria-valuemax]="max"
    >
      <span class="progress__rail">
        <span [style.width.%]="progress" class="progress__track"></span>
      </span>

      <span class="text-base-fluid">{{ progress }}%</span>
    </span>
  </button>

  <app-popover [id]="anchorId" [anchorId]="id">
    <p>
      Completed: <span>{{ now | number: '2.0-0' }}</span> /
      <span>{{ max | number: '2.0-0' }}</span>
    </p>
  </app-popover>
</div>
