@let badgeRewardLevelValue = badgeRewardLevel();
@let inProgressValue = inProgress();

<article class="topic-card">
  <header class="topic-card__header">
    <h2 class="h3 topic-card__heading">{{ heading() }}</h2>

    <p class="topic-card__subheading">{{ subheading() }}</p>

    @if (inProgressValue || badgeRewardLevelValue) {
      <ul class="topic-card__badges">
        @if (inProgressValue) {
          <li>
            <app-badge text="In progress" color="info" />
          </li>
        }

        @if (badgeRewardLevelValue) {
          <li>
            <app-badge
              class="topic-card__badge"
              [text]="badgeRewardLevelValue"
              [popoverContent]="'90%+ Senior\n70%+ Middle\n50%+ Junior'"
              [color]="badgeRewardLevelColor()"
            />
          </li>
        }
      </ul>
    }
  </header>

  <div class="topic-card__body">
    <p>{{ description() }}</p>
  </div>

  <footer class="topic-card__footer">
    <app-button [link]="'topic/' + id()" [isSmallButton]="true">Start topic</app-button>
  </footer>
</article>
