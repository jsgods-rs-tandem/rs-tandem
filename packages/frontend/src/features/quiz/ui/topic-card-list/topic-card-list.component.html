@let list = topics();

<ul class="topic-card-list">
  @for (listItem of list; track listItem.id) {
    <li>
      <app-topic-card
        [heading]="listItem.name"
        [description]="listItem.description"
        [questionsCount]="listItem.questionsCount"
        [score]="listItem.score"
      />
    </li>
  }
</ul>
