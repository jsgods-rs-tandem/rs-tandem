<h2 class="h3 title">{{ 'settings.ai.title' | transloco }}</h2>
<app-line-break></app-line-break>

@if (isLoading()) {
  <div class="loading-wrapper">
    <app-spin [size]="'large'" [theme]="'light'"></app-spin>
  </div>
} @else {
  <form [formGroup]="settingsForm" class="form" (ngSubmit)="handleSubmit()">
    <div class="row">
      <h3 class="h3">{{ 'settings.ai.useRemoteProvider' | transloco }}</h3>
      <app-switcher
        (toggledEvent)="toggleProvider($event)"
        [initialStatus]="settings().useRemoteProvider"
      ></app-switcher>
    </div>

    <div class="provider-wrapper" [ngClass]="settings().useRemoteProvider ? 'enabled' : 'disabled'">
      <app-select
        [label]="'settings.ai.provider' | transloco"
        [placeholder]="'settings.ai.providerPlaceholder' | transloco"
        [options]="providerOptions()"
        [selectedOptionValues]="selectedProvider()"
        (selectedOptionValuesChange)="onProviderChange($event)"
      />
      <div class="model-wrapper">
        <h3 class="text-base settings-label">{{ 'settings.ai.model' | transloco }}</h3>
        <app-input
          [placeholder]="'Model'"
          formControlName="model"
          [targetType]="'text'"
        ></app-input>
      </div>

      <div>
        <h3 class="text-base settings-label">{{ 'settings.ai.apiKey' | transloco }}</h3>
        <app-input
          [placeholder]="'settings.ai.apiKey' | transloco"
          class="input"
          formControlName="apiKey"
          [targetType]="'password'"
        ></app-input>
      </div>
    </div>

    <div class="control-wrapper">
      <app-button type="submit">{{ 'settings.ai.update' | transloco }}</app-button>
      <app-button (click)="resetChatHistory()">{{
        'settings.ai.resetHistory' | transloco
      }}</app-button>
    </div>
  </form>
}
