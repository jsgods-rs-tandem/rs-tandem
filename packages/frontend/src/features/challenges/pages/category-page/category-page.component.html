@let category = challengesService.category();
@let loading = challengesService.loading();

<app-layout [loading]="loading.category || loading.codeEditor">
  @if (category) {
    <header class="category-page__header">
      <h1 class="h2">{{ category.name }}</h1>

      <app-progress
        class="category-page__progress"
        [valueNow]="category.topicsCompleteCount"
        [valueMax]="category.topicsCount"
        [valueProgress]="category.progress"
      />
    </header>

    <ul class="category-page__list">
      @for (topic of category.topics; track topic.id) {
        <li>
          <app-challenge-preview-card
            [id]="topic.id"
            [heading]="topic.name"
            [description]="topic.description"
            [difficulty]="topic.difficulty"
            [tags]="topic.tags"
            [inProgress]="topic.status === 'inProgress'"
            [isComplete]="topic.status === 'completed'"
          />
        </li>
      }
    </ul>
  } @else {
    <app-empty
      class="category-page__empty"
      heading="Category is&nbsp;currently empty"
      [headingLevel]="1"
      description="We&nbsp;couldn&rsquo;t find any challenges in&nbsp;this category right now. Try refreshing the page or&nbsp;explore other categories"
    >
      <div class="category-page__nav-buttons">
        <app-button [isSmallButton]="true" (click)="challengesService.reloadPage()"
          >Refresh page</app-button
        >

        <app-button link="/challenges" [isSmallButton]="true">Back to&nbsp;categories</app-button>
      </div>
    </app-empty>
  }
</app-layout>
