@let loading = challengesService.loading();
@let categoriesValue = challengesService.categories();

<app-layout [loading]="loading.categories || loading.category">
  @if (categoriesValue.length > 0) {
    <header class="categories-page__header">
      <h1 class="h2">{{ 'challenges.categories.heading' | transloco }}</h1>
    </header>

    <app-category-card-list
      class="categories-page__category-card-list"
      [categories]="challengesService.categories()"
    />
  } @else {
    <app-empty
      class="categories-page__empty"
      [heading]="'challenges.categories.empty.heading' | transloco"
      [headingLevel]="1"
      [description]="'challenges.categories.empty.description' | transloco"
      ><app-button
        class="categories-page__refresh-button"
        [isSmallButton]="true"
        (click)="challengesService.reloadPage()"
        >{{ 'challenges.categories.empty.refreshButton' | transloco }}</app-button
      ></app-empty
    >
  }
</app-layout>
