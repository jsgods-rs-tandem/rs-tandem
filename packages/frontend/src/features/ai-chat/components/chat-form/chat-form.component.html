<form
  [formGroup]="messageForm"
  (ngSubmit)="handleSubmit(messageTextarea)"
  class="form"
  [class.disabled]="!isActive()"
>
  <textarea
    name="message"
    type="text"
    formControlName="message"
    class="text-area"
    #messageTextarea
    (input)="autoResize(messageTextarea)"
    (keydown.enter)="submitOnEnter($event, messageTextarea)"
    [placeholder]="'ai.chat.placeholder' | transloco"
  ></textarea>
  <app-icon-button
    class="submit"
    [icon]="'arrow-up'"
    type="submit"
    [disabled]="!messageForm.value.message?.trim()"
    [color]="'brand'"
  ></app-icon-button>
</form>
