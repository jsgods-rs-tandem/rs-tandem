<section class="profile">
  <h1 class="h2">{{ title }}</h1>

  <div class="user__content">
    @let currentUser = user();
    @if (loading()) {
      <div class="spin__wrapper">
        <app-spin size="large" theme="light" />
      </div>
    } @else if (currentUser) {
      @if (isViewing()) {
        <app-profile-view [user]="currentUser" (editClicked)="state.set('edit')" />
      } @else {
        <app-profile-edit
          [user]="currentUser"
          [isSaving]="isSaving()"
          (cancelClicked)="state.set('view')"
          (saveClicked)="saveProfile($event)"
        />
      }
    }
  </div>
</section>
