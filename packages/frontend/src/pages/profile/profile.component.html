<section class="profile">
  <h1 class="h2">{{ title }}</h1>

  <div class="user__content">
    @if (user(); as currentUser) {
      @if (isViewing()) {
        <app-profile-view [user]="currentUser" (editClicked)="state.set('edit')" />
      } @else {
        <app-profile-edit
          [user]="currentUser"
          [isSaving]="isSaving()"
          (cancelClicked)="state.set('view')"
          (saveClicked)="saveProfile($event)"
        />
      }
    } @else {
      <!-- CHANGE TO SPIN LOADING -->
      <p>Loading profile data...</p>
    }
  </div>
</section>
