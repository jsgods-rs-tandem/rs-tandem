<div class="user__wrapper">
  <div class="user__avatar-section">
    <div class="user__avatar">
      <img [src]="avatarUrl()" [alt]="'profile.view.avatarAlt' | transloco" class="avatar" />
      @let github = githubUsername();
      @if (github) {
        <app-button
          class="github-link user__github"
          version="ghost"
          iconColor="brand"
          icon="github"
          [text]="github"
          [href]="linkUrl()"
          [external]="true"
          [ariaLabel]="ariaLabelKey() | transloco: githubAriaParams()"
        />
      }
    </div>
  </div>

  <div class="user__info-section">
    <p class="text-3xl user__name">{{ userName() }}</p>
    <p class="text-lg user__email">{{ userEmail() }}</p>
    @let dateInfo = joinedDateText();
    <p class="text-sm">{{ dateInfo.key | transloco: dateInfo.params }}</p>
  </div>

  <div class="user__button-section">
    <app-button
      type="button"
      [isSmallButton]="true"
      version="primary"
      [text]="'profile.view.editButton' | transloco"
      [ariaLabel]="'profile.view.editAriaLabel' | transloco"
      (click)="editClicked.emit()"
    />
  </div>
</div>
