<div class="avatar-edit">
  @let selectedUrl = selectedAvatarUrl();
  <div class="avatar-edit__main" aria-live="polite">
    <img [src]="selectedUrl" alt="Selected user avatar" class="avatar-edit__large" />
  </div>

  <div
    class="avatar-edit__carousel"
    role="region"
    aria-roledescription="carousel"
    aria-label="Avatar options"
  >
    <app-button
      version="ghost"
      [disabled]="!canGoPrev()"
      (click)="prev()"
      ariaLabel="Go to previous avatars"
    >
      <span class="carousel-arrow" aria-hidden="true">&#10094;</span>
    </app-button>

    <ul class="carousel-items" role="list" aria-label="Available avatar options">
      @for (avatar of visibleAvatars(); track avatar; let i = $index) {
        @let isSelected = avatar === selectedUrl;
        @let avatarIndex = startIndex() + i + 1;
        <li role="listitem" aria-roledescription="slide">
          <app-button
            type="button"
            version="ghost"
            class="carousel-items__button"
            [class.selected]="isSelected"
            (click)="selectAvatar(avatar)"
            (keyup.enter)="selectAvatar(avatar)"
            [attr.aria-current]="isSelected ? 'true' : null"
            [ariaLabel]="`Select avatar option ${avatarIndex}`"
          >
            <img
              [src]="avatar"
              [attr.alt]="`Avatar option ${avatarIndex}`"
              class="carousel-items__small"
            />
          </app-button>
        </li>
      }
    </ul>

    <app-button
      version="ghost"
      [disabled]="!canGoNext()"
      (click)="next()"
      ariaLabel="Go to next avatars"
    >
      <span class="carousel-arrow" aria-hidden="true">&#10095;</span>
    </app-button>
  </div>
</div>
