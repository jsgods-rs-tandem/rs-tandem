<div class="avatar-edit">
  @let selectedUrl = selectedAvatarUrl();
  <div class="avatar-edit__main">
    <img [src]="selectedUrl" alt="Selected user avatar" class="avatar-edit__large" />
  </div>

  <div class="avatar-edit__carousel">
    <app-button
      version="ghost"
      [disabled]="!canGoPrev()"
      (click)="prev()"
      ariaLabel="Previous avatars"
    >
      <span class="carousel-arrow">&#10094;</span>
    </app-button>

    <div class="carousel-items" role="listbox" aria-label="Avatar selection">
      @for (avatar of visibleAvatars(); track avatar; let i = $index) {
        @let isSelected = avatar === selectedUrl;
        @let avatarIndex = startIndex() + i + 1;
        <img
          [src]="avatar"
          alt="Avatar option"
          class="carousel-items__small"
          [class.selected]="isSelected"
          (click)="selectAvatar(avatar)"
          (keyup.enter)="selectAvatar(avatar)"
          tabindex="0"
          role="button"
          [attr.aria-label]="`Select avatar option ${avatarIndex}`"
          [attr.aria-pressed]="isSelected"
        />
      }
    </div>

    <app-button version="ghost" [disabled]="!canGoNext()" (click)="next()" ariaLabel="Next avatars">
      <span class="carousel-arrow">&#10095;</span>
    </app-button>
  </div>
</div>
