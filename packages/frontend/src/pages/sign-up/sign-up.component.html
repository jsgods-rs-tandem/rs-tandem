<app-auth-page
  heading="Sign Up"
  switchText="Already have an account?"
  [switchRoute]="ROUTE_PATHS.signIn"
  switchLinkText="Sign In"
>
  <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
    <app-input
      id="username"
      targetType="text"
      formControlName="username"
      label="Username"
      placeholder="Enter your username"
      [hasError]="signUpForm.controls.username.touched && signUpForm.controls.username.invalid"
      [errorText]="getErrorText('username')"
    />

    <app-input
      id="email"
      targetType="email"
      formControlName="email"
      label="Email"
      placeholder="Enter your email"
      [hasError]="signUpForm.controls.email.touched && signUpForm.controls.email.invalid"
      [errorText]="getErrorText('email')"
    />

    <app-input
      id="password"
      targetType="password"
      formControlName="password"
      label="Password"
      placeholder="Enter your password"
      [hasError]="signUpForm.controls.password.touched && signUpForm.controls.password.invalid"
      [errorText]="getErrorText('password')"
    />

    <app-button type="submit" text="Sign Up" [loading]="isLoading()" />
  </form>
</app-auth-page>
