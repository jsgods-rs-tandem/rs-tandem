<app-auth-page
  [heading]="'auth.signUp.title' | transloco"
  [switchText]="'auth.signUp.switchLink.title' | transloco"
  [switchRoute]="ROUTE_PATHS.signIn"
  [switchLinkText]="'auth.signUp.switchLink.button' | transloco"
  data-testid="page-container"
>
  <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
    <app-input
      id="username"
      targetType="text"
      formControlName="username"
      [label]="'auth.signUp.form.username.label' | transloco"
      [placeholder]="'auth.signUp.form.username.placeholder' | transloco"
      [hint]="'auth.signUp.form.username.hint' | transloco"
      [hasError]="isSubmitted() && signUpForm.controls.username.invalid"
      [errorText]="
        getValidationErrorKey('username')
          ? (getValidationErrorKey('username')! | transloco: { min: 3 })
          : ''
      "
    />

    <app-input
      id="email"
      targetType="email"
      formControlName="email"
      [label]="'auth.signUp.form.email.label' | transloco"
      [placeholder]="'auth.signUp.form.email.placeholder' | transloco"
      [hasError]="isSubmitted() && signUpForm.controls.email.invalid"
      [errorText]="
        getValidationErrorKey('email')
          ? (getValidationErrorKey('email')! | transloco: { min: 8 })
          : ''
      "
    />

    <app-input
      id="password"
      targetType="password"
      formControlName="password"
      [label]="'auth.signUp.form.password.label' | transloco"
      [placeholder]="'auth.signUp.form.password.placeholder' | transloco"
      [hasError]="isSubmitted() && signUpForm.controls.password.invalid"
    />

    <ul class="progressive-validation">
      @for (rule of passwordRules(); track rule.key) {
        <li [class.is-valid]="rule.valid" [class.is-invalid]="isSubmitted() && !rule.valid">
          <span class="material-icons">
            {{ rule.valid ? 'check_circle' : isSubmitted() ? 'cancel' : 'radio_button_unchecked' }}
          </span>
          {{ rule.key | transloco }}
        </li>
      }
    </ul>

    <app-button
      type="submit"
      [text]="'auth.signUp.form.submit' | transloco"
      [loading]="isLoading()"
      data-testid="submit-btn"
    />
  </form>
</app-auth-page>
