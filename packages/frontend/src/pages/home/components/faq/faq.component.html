<section class="faq">
  <h2 class="h2">{{ titleKey | transloco }}</h2>
  <div class="faq__accordion">
    <app-accordion [multi]="false">
      @for (element of faqData; track element.question; let isFirst = $first) {
        <app-accordion-item
          [title]="element.question | transloco"
          [isOpen]="isFirst"
          [description]="element.answer | transloco"
        />
      }
    </app-accordion>
  </div>
</section>
