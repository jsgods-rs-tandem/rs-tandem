<section class="about">
  <h2 class="h2">{{ title }}</h2>
  <div class="about__description">
    <p class="text-base-fluid">
      <span class="text_brand">{{ highlightBrand }}</span>
      {{ firstParagraph }}
    </p>
    <p class="text-base-fluid">{{ secondParagraph }}</p>
  </div>
  <app-button
    [link]="ROUTE_PATHS.signIn"
    [text]="buttonText"
    version="primary"
    icon="arrow-up"
    iconColor="secondary"
    iconPosition="end"
  />
</section>
