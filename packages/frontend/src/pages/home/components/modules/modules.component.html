<section class="modules">
  <h2 class="h2">{{ title }}</h2>
  <ul class="modules__list">
    @for (module of modules; track module.text) {
      <li class="modules__item">
        <app-card [title]="module.title">
          <p class="text-base-fluid">{{ module.text }}</p>
        </app-card>
      </li>
    }
  </ul>
  <app-button
    class="modules__button"
    [link]="ROUTE_PATHS.signIn"
    [text]="buttonText"
    version="primary"
    icon="arrow-up"
    iconColor="secondary"
    iconPosition="end"
  />
</section>
