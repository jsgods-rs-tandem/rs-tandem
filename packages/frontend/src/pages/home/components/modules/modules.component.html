<section class="modules">
  <h2 class="h2">{{ titleKey | transloco }}</h2>
  <ul class="modules__list">
    @for (module of modules; track module.titleKey) {
      <li class="modules__item" appInView>
        <app-card [title]="module.titleKey | transloco">
          <p class="text-base-fluid">{{ module.textKey | transloco }}</p>
        </app-card>
      </li>
    }
  </ul>
  <app-button
    class="modules__button"
    [link]="ROUTE_PATHS.signIn"
    [text]="buttonKey | transloco"
    version="primary"
    icon="arrow-up"
    iconColor="secondary"
    iconPosition="end"
  />
</section>
