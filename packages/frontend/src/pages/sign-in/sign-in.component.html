<app-auth-page
  [heading]="'auth.signIn.title' | transloco"
  [switchText]="'auth.signIn.switchLink.title' | transloco"
  [switchRoute]="ROUTE_PATHS.signUp"
  [switchLinkText]="'auth.signIn.switchLink.button' | transloco"
  data-testid="page-container"
>
  <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
    <app-input
      id="email"
      targetType="email"
      formControlName="email"
      [label]="'auth.signIn.form.email.label' | transloco"
      [placeholder]="'auth.signIn.form.email.placeholder' | transloco"
      [hasError]="signInForm.controls.email.touched && signInForm.controls.email.invalid"
      [errorText]="
        getValidationErrorKey('email')
          ? (getValidationErrorKey('email')! | transloco: { min: 8 })
          : ''
      "
    />

    <app-input
      id="password"
      targetType="password"
      formControlName="password"
      [label]="'auth.signIn.form.password.label' | transloco"
      [placeholder]="'auth.signIn.form.password.placeholder' | transloco"
      [hint]="'auth.signIn.form.password.hint' | transloco"
      [hasError]="signInForm.controls.password.touched && signInForm.controls.password.invalid"
      [errorText]="
        getValidationErrorKey('password')
          ? (getValidationErrorKey('password')! | transloco: { min: 8 })
          : ''
      "
    />

    <app-button
      type="submit"
      [text]="'auth.signIn.form.submit' | transloco"
      [loading]="isLoading()"
      data-testid="submit-btn"
    />
  </form>
</app-auth-page>
