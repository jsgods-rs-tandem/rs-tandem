<app-auth-page
  heading="Sign In"
  switchText="Don’t have an account?"
  [switchRoute]="ROUTE_PATHS.signUp"
  switchLinkText="Sign Up"
>
  <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
    <app-input
      id="email"
      targetType="email"
      formControlName="email"
      label="Email"
      placeholder="Enter your email"
      [hasError]="signInForm.controls.email.touched && signInForm.controls.email.invalid"
      [errorText]="getErrorText('email')"
    />

    <app-input
      id="password"
      targetType="password"
      formControlName="password"
      label="Password"
      placeholder="Enter your password"
      [hasError]="signInForm.controls.password.touched && signInForm.controls.password.invalid"
      [errorText]="getErrorText('password')"
    />

    <app-button type="submit" text="Sign In" />
  </form>
</app-auth-page>

@if (isErrorModalOpen()) {
  <app-modal
    title="Login Error"
    message="Invalid email or password. Please check your credentials and try again."
    icon="info-outline"
    (closed)="isErrorModalOpen.set(false)"
  />
}
