@let featuresList = features();

<section class="library">
  <h1 class="h2">{{ 'library.heading' | transloco }}</h1>

  <ul class="library__list">
    @for (feature of featuresList; track $index) {
      <li class="library__list-item">
        <app-card [title]="feature.heading" [titleLevel]="2" footerPosition="end"
          >{{ feature.description }}
          <app-button
            icon="arrow-up"
            iconPosition="end"
            [link]="feature.href"
            [isSmallButton]="true"
            appCardFooter
            >{{ 'library.navButton' | transloco }}</app-button
          >
        </app-card>
      </li>
    }
  </ul>
</section>
