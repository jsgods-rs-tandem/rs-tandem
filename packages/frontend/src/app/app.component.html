<app-header
  [isMenuOpen]="isMobileMenuOpen()"
  (menuToggled)="toggleMenu()"
  [mode]="layoutService.headerMode()"
/>
<div class="layout-wrapper">
  @if (layoutService.showSidebar()) {
    <app-sidebar />
  }
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
<app-footer />

@if (modalService.activeModal(); as config) {
  <app-modal
    [title]="config.title"
    [message]="config.message"
    [icon]="config.icon ?? 'info-outline'"
    [buttonText]="config.buttonText ?? 'OK'"
    (closed)="modalService.close()"
  />
}
