<footer class="footer">
  <div class="footer__content">
    <span class="footer__copy text-xs-fluid">
      <span class="copy-symbol">&copy;</span> 2026 {{ 'footer.copy' | transloco }}
    </span>
    <span class="footer__credits text-xs-fluid">
      <span aria-hidden="true" class="footer__credits_divider">|</span>
      {{ 'footer.credits' | transloco }}&nbsp;<strong>JSGods</strong>
    </span>
  </div>

  <app-button
    icon="github"
    iconColor="neutral"
    [href]="githubUrl"
    [external]="true"
    [ariaLabel]="githubAriaKey | transloco"
    version="ghost"
  />
</footer>
