<app-button
  type="button"
  version="ghost"
  class="mobile-menu__trigger"
  [class.open]="isOpen()"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-label]="(isOpen() ? 'mobileMenu.aria.close' : 'mobileMenu.aria.open') | transloco"
  aria-controls="mobile-navigation"
  (click)="onToggle()"
>
  <div class="burger-icon">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</app-button>

@if (isOpen()) {
  <div
    class="mobile-menu__backdrop"
    (click)="onToggle()"
    aria-hidden="true"
    animate.enter="fade-in"
    animate.leave="fade-out"
  ></div>
  <div
    id="mobile-navigation"
    class="mobile-menu__panel"
    role="dialog"
    aria-modal="true"
    animate.enter="slide-in"
    animate.leave="slide-out"
  >
    <div class="mobile-menu__content">
      @if (layoutService.showSidebar()) {
        <app-navigation [links]="navService.links()" (linkClicked)="onToggle()" />
      }
      <ng-content select="[menu-content]"></ng-content>
    </div>
  </div>
}
