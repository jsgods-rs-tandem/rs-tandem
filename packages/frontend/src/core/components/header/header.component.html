<header class="header">
  <app-button [link]="logoLink()" version="logo" [ariaLabel]="logoAriaLabel() | transloco">
    <app-logo size="m" class="header__logo" />
  </app-button>

  <div class="header__menu">
    <div class="header__system">
      <ng-container *ngTemplateOutlet="systemButtons" />
    </div>
    <div class="header__actions">
      <ng-container *ngTemplateOutlet="mainAction" />
    </div>
    <app-mobile-menu [isOpen]="isMenuOpen()" (menuToggled)="menuToggled.emit()">
      <div menu-content class="mobile-nav-layout">
        <div class="mobile-nav-group">
          <ng-container *ngTemplateOutlet="systemButtons" />
        </div>
        <div class="mobile-nav-group">
          <ng-container *ngTemplateOutlet="mainAction" />
        </div>
      </div>
    </app-mobile-menu>
  </div>
</header>

<ng-template #systemButtons>
  <app-button
    [text]="languageText()"
    version="ghost"
    icon="language"
    iconColor="neutral"
    [ariaLabel]="languageAriaLabel() | transloco"
    (click)="toggleLanguage()"
  />
  <app-icon-button
    [icon]="themeIcon()"
    [ariaLabel]="themeAriaLabel() | transloco"
    (click)="toggleTheme()"
  />
</ng-template>

<ng-template #mainAction>
  @let config = actionConfig();
  <app-button
    [text]="config.text | transloco"
    [ariaLabel]="config.text | transloco"
    [icon]="config.icon"
    iconPosition="end"
    [link]="config.link"
    version="primary"
    [isSmallButton]="true"
    (click)="config.isLogoutAction ? handleLogout() : null"
  />
</ng-template>
