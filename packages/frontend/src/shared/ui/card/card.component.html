<article class="card">
  @let titleValue = title();
  @if (titleValue) {
    <header class="card__header">
      @switch (titleLevel()) {
        @case (2) {
          <h2 class="h3">{{ titleValue }}</h2>
        }
        @default {
          <h3 class="h3">{{ titleValue }}</h3>
        }
      }
    </header>
  }
  <div class="card__body">
    <ng-content></ng-content>
  </div>
  @if (footerExists()) {
    <footer class="card__footer card__footer_{{ footerPosition() }}">
      <ng-content select="[appCardFooter]"></ng-content>
    </footer>
  }
</article>
