<article class="card">
  @let titleValue = title();
  @let imageValue = imageSrc();
  @if (titleValue || imageValue) {
    <header class="card__header">
      @if (titleValue) {
        <h3 class="h3">{{ titleValue }}</h3>
      }
      @if (imageValue) {
        <img [src]="imageValue" [alt]="imageAlt()" class="card__img" />
      }
    </header>
  }
  <div class="card__main">
    <ng-content></ng-content>
  </div>
  @if (footerExists()) {
    <footer class="card__footer card__footer_{{ footerPosition() }}">
      <ng-content select="[card-footer]"></ng-content>
    </footer>
  }
</article>
