@let memberName = nameKey() | transloco;
@let link = linkUrl();

<article class="team-card" [class.team-card_rotate]="isRotate()" appInView [threshold]="0.8">
  <header class="team-card__header">
    <img
      [src]="avatarUrl()"
      [alt]="'team.aria.avatarAlt' | transloco: { name: memberName }"
      class="team-card__avatar"
    />
  </header>

  <div class="team-card__body">
    <h3 class="text-base-fluid team-card__name">{{ memberName }}</h3>
  </div>
  @if (link) {
    <footer class="team-card__footer">
      <app-button
        class="team-card_link"
        version="ghost"
        iconColor="brand"
        [icon]="icon()"
        [text]="linkText() ?? ''"
        [href]="link"
        [external]="true"
        [ariaLabel]="'team.aria.memberLink' | transloco: { name: memberName }"
      />
    </footer>
  }
</article>
