<div class="input-wrapper" [ngClass]="{ 'is-error': hasError(), 'is-disabled': disabled() }">
  @if (label()) {
    <label [for]="inputId()" class="input-label" [class.is-disabled]="disabled()">
      {{ label() }}

      @if (required()) {
        <span class="required-asterisk" aria-hidden="true">*</span>
      }
    </label>
  }

  <input
    class="input-element"
    [value]="value"
    [id]="inputId()"
    [name]="name() || inputId()"
    [attr.name]="name() || inputId()"
    [type]="targetType()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [autocomplete]="autoComplete()"
    [required]="required()"
    (input)="onInputChange($event)"
    (blur)="onTouched()"
  />

  <div class="input-error-wrapper">
    @if (hasError()) {
      <span class="input-error-text">{{ errorText() }}</span>
    }
  </div>
</div>
