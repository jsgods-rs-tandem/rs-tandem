<div class="input-wrapper" [ngClass]="{ 'is-error': hasError(), 'is-disabled': disabled() }">
  @if (label()) {
    <label [for]="inputId()" class="input-label" [class.is-disabled]="disabled()">
      {{ label() }}

      @if (required()) {
        <span class="required-asterisk" aria-hidden="true">*</span>
      }

      @if (hint()) {
        <div class="input-hint-wrapper">
          <span class="material-icons input-hint-icon" [attr.aria-label]="hint()">help</span>
          <div class="input-hint-popover">{{ hint() }}</div>
        </div>
      }
    </label>
  }

  <div class="input-container">
    <input
      class="input-element"
      [class.has-toggle]="targetType() === 'password'"
      [value]="value"
      [attr.data-testid]="testId()"
      [id]="inputId()"
      [name]="computedName()"
      [type]="computedType()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [autocomplete]="autoComplete()"
      [required]="required()"
      (input)="onInputChange($event)"
      (blur)="onTouched()"
    />

    @if (targetType() === 'password') {
      <button
        type="button"
        class="password-toggle-btn"
        (click)="togglePasswordVisibility()"
        tabindex="-1"
        [attr.aria-label]="isPasswordVisible() ? 'Hide password' : 'Show password'"
      >
        <span class="material-icons" aria-hidden="true">
          {{ isPasswordVisible() ? 'visibility_off' : 'visibility' }}
        </span>
      </button>
    }
  </div>

  <div class="input-error-wrapper">
    @if (hasError()) {
      <span class="input-error-text">{{ errorText() }}</span>
    }
  </div>
</div>
