@let list = categories();

<ul class="category-card-list">
  @for (listItem of list; track listItem.id) {
    <li>
      <app-category-card
        [id]="listItem.id"
        [heading]="listItem.name"
        [description]="listItem.description"
        [topicsCount]="listItem.topicsCount"
        [topicsCompleteCount]="listItem.topicsCompleteCount"
        [topicsProgress]="listItem.progress"
      />
    </li>
  }
</ul>
