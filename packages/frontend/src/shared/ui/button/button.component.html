@let isLoading = loading();
@let fragValue = fragment();
<ng-template #content>
  @if (icon()) {
    <app-icon [name]="icon()!" size="m" class="button__icon" [color]="iconColor()" />
  }
  @if (text()) {
    <span class="button__text">{{ text() }}</span>
  }
  <ng-content />
</ng-template>

<ng-template #inner>
  <span class="button__wrapper button__wrapper_icon-{{ iconPosition() }}">
    <ng-container *ngTemplateOutlet="content" />
  </span>
</ng-template>

@if (href() && !disabled()) {
  <a
    [href]="href()"
    [class]="classes()"
    [target]="external() ? '_blank' : '_self'"
    [attr.rel]="external() ? 'noopener noreferrer' : null"
    [attr.aria-label]="displayAriaLabel()"
    [aria-current]="ariaCurrent()"
  >
    <ng-container *ngTemplateOutlet="inner" />
  </a>
} @else if (link() && !disabled()) {
  @if (fragValue) {
    <a
      [routerLink]="link()"
      [fragment]="fragValue"
      [class]="classes()"
      [attr.aria-label]="displayAriaLabel()"
      [aria-current]="ariaCurrent()"
    >
      <ng-container *ngTemplateOutlet="inner" />
    </a>
  } @else {
    <a
      [routerLink]="link()"
      [class]="classes()"
      [attr.aria-label]="displayAriaLabel()"
      [aria-current]="ariaCurrent()"
    >
      <ng-container *ngTemplateOutlet="inner" />
    </a>
  }
} @else {
  <button
    [type]="type()"
    [class]="classes()"
    [class.button_loading]="isLoading"
    [disabled]="disabled() || isLoading"
    [attr.aria-label]="displayAriaLabel()"
    [attr.aria-busy]="isLoading ? 'true' : null"
    [aria-current]="ariaCurrent()"
  >
    <ng-container *ngTemplateOutlet="inner" />

    @if (isLoading) {
      <app-spin class="button__spin" theme="button" />
    }
  </button>
}
