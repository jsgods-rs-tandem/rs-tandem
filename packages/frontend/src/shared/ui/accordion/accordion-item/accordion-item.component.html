<div class="accordion-item" [class.is-open]="isOpen()">
  <h3 class="accordion-item__title-wrapper">
    <app-button
      #headerBtn
      [id]="headerId"
      type="button"
      version="ghost"
      class="accordion-item__header"
      (click)="toggle()"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-controls]="contentId"
    >
      <div class="accordion-item__title-container">
        <span class="h3 accordion-item__title">{{ title() }}</span>
        <div class="accordion-item__icon" [class.is-open]="isOpen()">
          <span></span>
          <span></span>
        </div>
      </div>
    </app-button>
  </h3>

  <div
    [id]="contentId"
    [attr.aria-labelledby]="headerId"
    class="accordion-item__content-wrapper"
    role="region"
    [style.grid-template-rows]="isOpen() ? '1fr' : '0fr'"
  >
    <div class="accordion-item__content text">
      <ng-content></ng-content>
    </div>
  </div>
</div>
